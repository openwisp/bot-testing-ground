name: CI Experiment

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:

  # CASE 1: Pure Transient. Should be completely forgiven.
  job1-pure-transient:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Simulated Transient Error
        run: |
          echo "##[group]Test Setup"
          echo "Setting up Selenium WebDriver..."
          echo "##[error]selenium.common.exceptions.InvalidSessionIdException: Message: Session is not active"
          exit 1

  # CASE 2: Transient with Generic Traceback. 
  # TESTS: The bot must forgive the "Traceback" and "ERROR:" because the transient marker is present.
  job2-transient-with-traceback:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Network Transient Error
        run: |
          echo "##[group]Package Installation"
          echo "Traceback (most recent call last):"
          echo "  File \"urllib3/connectionpool.py\", line 703"
          echo "##[error]ERROR: Could not install packages due to an OSError: HTTPSConnectionPool"
          echo "##[error]Network is unreachable"
          exit 1

  # CASE 3: Pure Generic Bug (No Transient Marker). 
  # TESTS: The bot must NOT forgive this. It must flag it as a real test failure.
  job3-pure-generic-bug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generic Error
        run: |
          echo "##[group]Run Application"
          echo "Traceback (most recent call last):"
          echo "  File \"app/models.py\", line 45, in save"
          echo "TypeError: 'NoneType' object is not subscriptable"
          echo "##[error]ERROR: Process exited with code 1"
          exit 1

  # CASE 4: Pure Strict Bug. 
  # TESTS: The bot must instantly flag this as a real test failure.
  job4-strict-test-failure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Real Test Failure
        run: |
          echo "##[group]Run Tests"
          echo "FAIL: test_user_login (auth.tests)"
          echo "Traceback (most recent call last):"
          echo "  File \"auth/tests.py\", line 112, in test_user_login"
          echo "AssertionError: False is not true"
          exit 1

  # CASE 5: Mixed Error (Strict + Transient). 
  # TESTS: The strict failure MUST override the transient failure and block the retry.
  job5-mixed-strict-and-transient:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Mixed Failure
        run: |
          echo "##[group]Run Selenium Tests"
          echo "FAILED (errors=1)"
          echo "AssertionError: Element not found"
          echo "..."
          echo "##[error]marionette.errors.MarionetteException: connection lost"
          exit 1
