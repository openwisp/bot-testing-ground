name: CI Experiment

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:

  job1:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Simulated Transient Error
        run: |
          echo "##[group]Test Setup"
          echo "Setting up Selenium WebDriver..."
          echo "Connecting to Marionette..."
          echo "##[error]selenium.common.exceptions.InvalidSessionIdException: Message: Session is not active"
          echo "##[error]NS_ERROR_CONNECTION_REFUSED"
          echo "##[error]Connection reset by peer"
          exit 1

  job2:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Another Transient Error
        run: |
          echo "##[group]Database Connection"
          echo "Connecting to PostgreSQL..."
          echo "##[error]OperationalError: database is locked"
          echo "Waiting for database..."
          exit 1

  job3:
    runs-on: ubuntu-latest

    steps:
      - name: Network Transient Error
        run: |
          echo "##[group]Package Installation"
          echo "Installing dependencies..."
          echo "##[error]ERROR: Could not install packages due to an OSError: HTTPSConnectionPool"
          echo "##[error]Network is unreachable"
          exit 1
