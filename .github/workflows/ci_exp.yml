name: CI Experiment

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:

  # CASE 1: Pure Transient. Should be completely forgiven.
  job1-pure-transient:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Simulated Transient Error
        run: |
          echo "##[group]Test Setup"
          echo "Setting up Selenium WebDriver..."
          echo "##[error]selenium.common.exceptions.InvalidSessionIdException: Message: Session is not active"
          exit 1

  # CASE 2: Transient with Generic Traceback. 
  # TESTS: The bot must forgive the "Traceback" and "ERROR:" because the transient marker is present.
  job2-transient-with-traceback:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Network Transient Error
        run: |
          echo "##[group]Package Installation"
          echo "Traceback (most recent call last):"
          echo "  File \"urllib3/connectionpool.py\", line 703"
          echo "##[error]ERROR: Could not install packages due to an OSError: HTTPSConnectionPool"
          echo "##[error]Network is unreachable"
          exit 1
