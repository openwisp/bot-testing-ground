name: PR Issue Auto-Assignment
on:
  pull_request_target:
    types: [opened, reopened, closed, edited]
permissions:
  contents: read
  issues: write
  pull-requests: read
concurrency:
  group: bot-autoassign-pr-link-${{ github.repository }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true
jobs:
  auto-assign-issue:
    if: github.event.action != 'closed' || github.event.pull_request.merged == false
    uses: prathmeshkulkarni-coder/openwisp-utils/.github/workflows/reusable-bot-autoassign.yml@feature/709-flag-invalid-prs
    with:
      bot_command: issue_assignment
      openwisp_utils_repo: prathmeshkulkarni-coder/openwisp-utils
      openwisp_utils_ref: feature/709-flag-invalid-prs
    secrets:
      OPENWISP_BOT_APP_ID: ${{ secrets.OPENWISP_BOT_APP_ID }}
      OPENWISP_BOT_PRIVATE_KEY: ${{ secrets.OPENWISP_BOT_PRIVATE_KEY }}
